<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" style="background-color: #F8FAFC; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <!-- Title -->
  <rect x="0" y="0" width="1000" height="80" fill="#1E293B" />
  <text x="500" y="40" fill="#FFFFFF" font-size="28" font-weight="bold" text-anchor="middle">Latent Profile Analysis (LPA): Discovering Hidden Profiles</text>
  <text x="500" y="65" fill="#94A3B8" font-size="16" text-anchor="middle">From Raw Continuous Data to Meaningful Categorical Groups</text>

  <!-- Column Backgrounds -->
  <rect x="40" y="100" width="440" height="670" rx="15" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2" />
  <rect x="520" y="100" width="440" height="670" rx="15" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2" />

  <!-- Column Headers -->
  <rect x="40" y="100" width="440" height="50" rx="15" fill="#2563EB" />
  <rect x="40" y="125" width="440" height="25" fill="#2563EB" />
  <text x="260" y="132" fill="#FFFFFF" font-size="20" font-weight="bold" text-anchor="middle">Analogy: Mobile Legends Player</text>

  <rect x="520" y="100" width="440" height="50" rx="15" fill="#059669" />
  <rect x="520" y="125" width="440" height="25" fill="#059669" />
  <text x="740" y="132" fill="#FFFFFF" font-size="20" font-weight="bold" text-anchor="middle">Research: Autism Caregiver</text>

  <!-- STAGE 1: INPUT -->
  <text x="500" y="200" fill="#475569" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90 500 200)">STAGE 1: INPUT</text>
  
  <!-- ML Input -->
  <rect x="80" y="170" width="360" height="80" rx="10" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2" />
  <circle cx="120" cy="210" r="20" fill="#DBEAFE" />
  <text x="120" y="218" fill="#1D4ED8" font-size="24" font-weight="bold" text-anchor="middle">?</text>
  <text x="160" y="205" fill="#1E293B" font-size="16" font-weight="bold">Unknown Player Roles</text>
  <text x="160" y="225" fill="#64748B" font-size="13">Players enter a match. We don't</text>
  <text x="160" y="240" fill="#64748B" font-size="13">know who plays what role yet.</text>

  <!-- Caregiver Input -->
  <rect x="560" y="170" width="360" height="80" rx="10" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2" />
  <circle cx="600" cy="210" r="20" fill="#DCFCE7" />
  <text x="600" y="218" fill="#047857" font-size="24" font-weight="bold" text-anchor="middle">?</text>
  <text x="640" y="205" fill="#1E293B" font-size="16" font-weight="bold">Unknown Caregiver Needs</text>
  <text x="640" y="225" fill="#64748B" font-size="13">Parents face daily challenges. We don't</text>
  <text x="640" y="240" fill="#64748B" font-size="13">know their psychological barriers.</text>

  <!-- Arrows -->
  <path d="M 260 250 L 260 270" stroke="#94A3B8" stroke-width="3" fill="none" marker-end="url(#arrow)" />
  <path d="M 740 250 L 740 270" stroke="#94A3B8" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STAGE 2: QUESTIONNAIRES / DATA -->
  <text x="500" y="340" fill="#475569" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90 500 340)">STAGE 2: DATA</text>

  <!-- ML Data -->
  <rect x="80" y="280" width="360" height="120" rx="10" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2" />
  <rect x="100" y="310" width="40" height="50" rx="5" fill="#DBEAFE" />
  <line x1="110" y1="320" x2="130" y2="320" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" />
  <line x1="110" y1="330" x2="130" y2="330" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" />
  <line x1="110" y1="340" x2="130" y2="340" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" />
  <text x="160" y="310" fill="#1E293B" font-size="16" font-weight="bold">Continuous Gameplay Stats</text>
  <text x="160" y="335" fill="#3B82F6" font-size="14">• Damage Dealt (Score: 0 - 100k)</text>
  <text x="160" y="355" fill="#3B82F6" font-size="14">• Damage Taken (Score: 0 - 100k)</text>
  <text x="160" y="375" fill="#3B82F6" font-size="14">• Gold Per Minute (Score: 0 - 1000)</text>

  <!-- Caregiver Data -->
  <rect x="560" y="280" width="360" height="120" rx="10" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2" />
  <rect x="580" y="310" width="40" height="50" rx="5" fill="#DCFCE7" />
  <line x1="590" y1="320" x2="610" y2="320" stroke="#10B981" stroke-width="3" stroke-linecap="round" />
  <line x1="590" y1="330" x2="610" y2="330" stroke="#10B981" stroke-width="3" stroke-linecap="round" />
  <line x1="590" y1="340" x2="610" y2="340" stroke="#10B981" stroke-width="3" stroke-linecap="round" />
  <text x="640" y="310" fill="#1E293B" font-size="16" font-weight="bold">CSI-PASD Questionnaire</text>
  <text x="640" y="335" fill="#10B981" font-size="14">• Attitude (TPB Score)</text>
  <text x="640" y="355" fill="#10B981" font-size="14">• Subjective Norms (TPB Score)</text>
  <text x="640" y="375" fill="#10B981" font-size="14">• Perceived Behavioral Control</text>

  <!-- Arrows -->
  <path d="M 260 400 L 260 430" stroke="#94A3B8" stroke-width="3" fill="none" marker-end="url(#arrow)" />
  <path d="M 740 400 L 740 430" stroke="#94A3B8" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STAGE 3: DESIGN / LPA ENGINE -->
  <text x="500" y="490" fill="#475569" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90 500 490)">STAGE 3: DESIGN</text>

  <!-- LPA Shared Engine -->
  <rect x="80" y="440" width="840" height="90" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2" />
  <rect x="450" y="460" width="100" height="50" rx="25" fill="#CBD5E1" />
  <circle cx="500" cy="485" r="15" fill="#475569" />
  <path d="M 495 480 L 505 485 L 495 490 Z" fill="#FFFFFF" />
  <text x="260" y="480" fill="#1E293B" font-size="18" font-weight="bold" text-anchor="middle">Latent Profile Analysis (LPA)</text>
  <text x="260" y="505" fill="#64748B" font-size="14" text-anchor="middle">Algorithm finds hidden clusters in the numbers</text>

  <text x="740" y="480" fill="#1E293B" font-size="18" font-weight="bold" text-anchor="middle">Latent Profile Analysis (LPA)</text>
  <text x="740" y="505" fill="#64748B" font-size="14" text-anchor="middle">Algorithm finds hidden clusters in the scores</text>

  <!-- Arrows -->
  <path d="M 260 530 L 260 560" stroke="#94A3B8" stroke-width="3" fill="none" marker-end="url(#arrow)" />
  <path d="M 740 530 L 740 560" stroke="#94A3B8" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STAGE 4: OUTPUT -->
  <text x="500" y="650" fill="#475569" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90 500 650)">STAGE 4: OUTPUT</text>

  <!-- ML Output -->
  <rect x="80" y="570" width="360" height="170" rx="10" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2" />
  <text x="260" y="600" fill="#1E293B" font-size="16" font-weight="bold" text-anchor="middle">5 Discovered Roles (Profiles)</text>
  
  <!-- Profile Badges ML -->
  <rect x="100" y="620" width="150" height="30" rx="15" fill="#DBEAFE" />
  <text x="175" y="640" fill="#1D4ED8" font-size="12" font-weight="bold" text-anchor="middle">Jungler</text>
  
  <rect x="270" y="620" width="150" height="30" rx="15" fill="#DBEAFE" />
  <text x="345" y="640" fill="#1D4ED8" font-size="12" font-weight="bold" text-anchor="middle">Roamer</text>

  <rect x="100" y="660" width="150" height="30" rx="15" fill="#DBEAFE" />
  <text x="175" y="680" fill="#1D4ED8" font-size="12" font-weight="bold" text-anchor="middle">Gold Laner</text>

  <rect x="270" y="660" width="150" height="30" rx="15" fill="#DBEAFE" />
  <text x="345" y="680" fill="#1D4ED8" font-size="12" font-weight="bold" text-anchor="middle">EXP Laner</text>

  <rect x="185" y="700" width="150" height="30" rx="15" fill="#DBEAFE" />
  <text x="260" y="720" fill="#1D4ED8" font-size="12" font-weight="bold" text-anchor="middle">Mid Laner</text>

  <!-- Caregiver Output -->
  <rect x="560" y="570" width="360" height="170" rx="10" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2" />
  <text x="740" y="600" fill="#1E293B" font-size="16" font-weight="bold" text-anchor="middle">3 Targeted Counseling Profiles</text>
  
  <!-- Profile Badges Caregiver -->
  <rect x="580" y="620" width="320" height="35" rx="5" fill="#DCFCE7" />
  <text x="740" y="643" fill="#047857" font-size="14" font-weight="bold" text-anchor="middle">Profile 1: Attitude-Focused</text>

  <rect x="580" y="665" width="320" height="35" rx="5" fill="#DCFCE7" />
  <text x="740" y="688" fill="#047857" font-size="14" font-weight="bold" text-anchor="middle">Profile 2: Norm-Focused</text>

  <rect x="580" y="710" width="320" height="35" rx="5" fill="#DCFCE7" />
  <text x="740" y="733" fill="#047857" font-size="14" font-weight="bold" text-anchor="middle">Profile 3: Control-Focused</text>

  <!-- Definitions -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8" />
    </marker>
  </defs>
</svg>
