  <script type="text/javascript"><![CDATA[
    window.addEventListener('message', (e) => {
      if(e.data && e.data.theme === 'light') {
        document.documentElement.classList.add('light-theme');
      } else if (e.data && e.data.theme === 'dark') {
        document.documentElement.classList.remove('light-theme');
      }
    });
  ]]></script>


  <!-- Background -->
  <rect width="1100" height="520" fill="transparent"/>

  <style>
    .clickable { cursor: pointer; transition: all 0.2s ease; outline: none; }
    .clickable:focus { outline: none; }
    .clickable:hover rect { fill: #2c529d; } /* Removed the mustard yellow stroke */
  </style>

